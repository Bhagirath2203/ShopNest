# ───── Application ─────
spring.application.name=ShopNest Backend
server.port=8080

# ───── MySQL Database ─────
spring.datasource.url=jdbc:mysql://localhost:3307/shopnest?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:shopnest_user}
spring.datasource.password=${MYSQL_PASSWORD:shopnest_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ───── JPA / Hibernate ─────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ───── Redis Cache ─────
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# ───── JWT Configuration ─────
app.jwt.secret=${JWT_SECRET:myUltraSecretKeyForJWTTokenGenerationShopNest2024!@#$%^&*()}
app.jwt.expiration-ms=86400000

# ───── Actuator ─────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ───── Logging ─────
logging.level.com.shopnest=DEBUG
logging.level.org.springframework.security=DEBUG
