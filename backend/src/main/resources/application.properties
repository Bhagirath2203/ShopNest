# ───── Application ─────
spring.application.name=ShopNest Backend
server.port=8080

# ───── MySQL Database ─────
spring.datasource.url=jdbc:mysql://localhost:3307/shopnest?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:shopnest_user}
spring.datasource.password=${MYSQL_PASSWORD:shopnest_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ───── JPA / Hibernate ─────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ───── Redis Cache (optional — falls back to in-memory if unavailable) ─────
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}

# ───── JWT Configuration ─────
app.jwt.secret=${JWT_SECRET:myUltraSecretKeyForJWTTokenGenerationShopNest2024!@#$%^&*()}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ───── Actuator ─────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ───── Profiles ─────
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ───── Pagination Limits ─────
spring.data.web.pageable.max-page-size=50
spring.data.web.pageable.default-page-size=12

# ───── Graceful Shutdown ─────
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ───── Response Compression ─────
server.compression.enabled=true
server.compression.mime-types=application/json
server.compression.min-response-size=1024

# ───── Gemini AI ─────
app.gemini.api-key=${GEMINI_API_KEY:}

# ─────# ✨ Razorpay ✨
app.razorpay.key-id=${RAZORPAY_KEY_ID:}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}

# ✨ Environment Variables ✨
spring.config.import=optional:file:../.env
